# En este fichero mejor no poner caracteres especiales
spring.application.name=EjemploSpringBoot-productos
# Se procesa data.sql despues de que Hibernate crea el esquema de base de datos
spring.jpa.defer-datasource-initialization=true
# Definicion de la base de datos (H2, en memoria, util para desarrollo
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console