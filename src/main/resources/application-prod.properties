# En este fichero mejor no poner caracteres especiales, como acentos

# Base de datos MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/productos
spring.datasource.username=root
spring.datasource.password=tu_password

# Evita cargar schema.sql o data.sql aunque estan
# presentes en el proyecto. En produccion, la base de datos 
# ya deberia estar configurada.
spring.sql.init.mode=never

# Desactivamos Swagger y openapi en produccion
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false