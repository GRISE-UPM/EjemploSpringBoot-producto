# En este fichero mejor no poner caracteres especiales, como acentos

# Hace que Hibernate primero cree las tablas automaticamente,
# y mas tarde ejecute data.sql
spring.jpa.defer-datasource-initialization=true

# Hibernate aplica automaticamente ddl-auto=create-drop con H2,
# pero se puede forzar
spring.jpa.hibernate.ddl-auto=create-drop

# Base de datos H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Evita la carga de schema.sql si esta presente
spring.sql.init.schema-locations=

# Carga data.sql
spring.sql.init.mode=always

# Activa Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true